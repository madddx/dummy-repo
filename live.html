<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>packets</title>
  <style>
    body {
      background: #c0c0c0;
      font-family: "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .window {
      background: #d4d0c8;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      width: 320px;
      box-shadow: 2px 2px 0 #000;
    }

    .titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: white;
      font-family: "Times New Roman", serif;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .titlebar-btns {
      display: flex;
      gap: 2px;
    }

    .titlebar-btns span {
      background: #d4d0c8;
      color: black;
      font-size: 9px;
      width: 14px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-right: 1px solid #808080;
      border-bottom: 1px solid #808080;
      cursor: default;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      background: white;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      padding: 8px 10px;
      font-size: 13px;
    }

    .row label {
      font-size: 10px;
      color: #444;
      display: block;
      margin-bottom: 2px;
      font-family: Arial, sans-serif;
    }

    .row .num {
      font-family: "Courier New", monospace;
      font-size: 18px;
      font-weight: bold;
      color: #000080;
    }

    .status {
      font-family: Arial, sans-serif;
      font-size: 10px;
      color: #333;
      background: #d4d0c8;
      border-top: 1px solid #808080;
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
    }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { visibility: hidden; } }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>📡 Packet Monitor</span>

    </div>
    <div class="body">
      <div class="row">
        <label>Sending packet:</label>
        <div class="num" id="send">—</div>
      </div>
      <div class="row">
        <label>Receiving packet:</label>
        <div class="num" id="recv">—</div>
      </div>
    </div>
    <div class="status">
      <span><span class="blink">▌</span> Running...</span>

    </div>
  </div>

  <script>
    function rand() { return Math.floor(Math.random() * 999999) + 100000; }
    function tick() {
      document.getElementById('send').textContent = rand();
      document.getElementById('recv').textContent = rand();
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
