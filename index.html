<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>packets</title>
  <style>
    body {
      background: #c0c0c0;
      font-family: "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .window {
      background: #d4d0c8;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      width: 320px;
      box-shadow: 2px 2px 0 #000;
    }

    .titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 6px;
      user-select: none;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      background: white;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      padding: 8px 10px;
    }

    .row label {
      font-size: 10px;
      color: #444;
      display: block;
      margin-bottom: 2px;
      font-family: Arial, sans-serif;
    }

    .row .num {
      font-family: "Courier New", monospace;
      font-size: 18px;
      font-weight: bold;
      color: #000080;
    }

    .status {
      font-family: Arial, sans-serif;
      font-size: 10px;
      color: #333;
      background: #d4d0c8;
      border-top: 1px solid #808080;
      padding: 3px 8px;
    }

    .blink { animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">📡 Packet Monitor</div>
    <div class="body">
      <div class="row">
        <label>Sending packet:</label>
        <div class="num blink" id="send">connecting...</div>
      </div>
      <div class="row">
        <label>Receiving packet:</label>
        <div class="num">0</div>
      </div>
    </div>
    <div class="status blink">connecting...</div>
  </div>
</body>
</html>
